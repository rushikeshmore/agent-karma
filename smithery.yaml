startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      api_url:
        type: string
        description: "AgentKarma API URL (optional, defaults to public API)"
    required: []
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: ['tsx', 'src/mcp/server.ts'],
      env: config.api_url ? { AGENTKARMA_API_URL: config.api_url } : {}
    })
